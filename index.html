<meta charset="UTF-8">

<title>月之週期 · 生理健康追蹤</title>
<link rel="manifest" href="manifest.json">

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #100810;
  --bg2:      #1a0f18;
  --bg3:      #221520;
  --surface:  #2a1826;
  --border:   rgba(255,255,255,0.08);
  --text:     #f0e8ee;
  --text2:    #b090a8;
  --text3:    #80607a;
  --pink:     #c0576a;
  --purple:   #8b7fd4;
  --teal:     #4db896;
  --amber:    #d4974d;
  --radius:   14px;
  --radius-sm: 8px;
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

#app { height: 100dvh; display: flex; flex-direction: column-reverse; overflow: hidden; }

/* ── Nav ── */
.nav-bar {
  display: flex;
  background: rgba(20,8,16,0.95);
  border-top: 0.5px solid var(--border);
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text3); cursor: pointer;
  padding: 4px 0; transition: color .2s;
}
.nav-btn.active { color: var(--pink); }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; }

/* ── Main scroll ── */
.main-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.main-content::-webkit-scrollbar { display: none; }

/* ── Home Header ── */
.home-header {
  padding: 24px 20px 20px;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; transition: background .5s;
}
.user-switcher { display: flex; gap: 8px; align-self: flex-end; }
.user-dot {
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 12px; font-weight: 600; color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.5; transition: opacity .2s, transform .2s;
}
.user-dot.active { opacity: 1; transform: scale(1.15); box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }

.moon-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 2.5px solid var(--pink);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; transition: border-color .5s;
  position: relative;
}
.moon-circle::before {
  content:''; position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
}
.day-num { font-size: 42px; font-weight: 600; line-height: 1; letter-spacing: -2px; }
.day-label { font-size: 11px; color: var(--text2); }

.phase-badge {
  font-size: 13px; font-weight: 500; padding: 5px 16px;
  border-radius: 20px; letter-spacing: .05em;
}

.cycle-bar-wrap { width: 100%; }
.cycle-bar {
  height: 8px; display: flex; border-radius: 4px; overflow: hidden;
  position: relative; width: 100%;
}
.cycle-seg { height: 100%; transition: background .4s; }
.cycle-indicator {
  position: absolute; top: -3px;
  width: 2px; height: 14px; background: #fff; border-radius: 1px;
  transform: translateX(-50%); transition: left .5s;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.bar-labels {
  display: flex; width: 100%; margin-top: 5px;
  font-size: 9px; text-align: center;
}
.bar-labels span { flex: 0 0 auto; }

/* ── Symptom Grid ── */
.sym-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  padding: 16px 14px 8px;
}
.sym-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 10px 6px; text-align: center;
  border: 0.5px solid var(--border);
}
.sym-icon { font-size: 18px; margin-bottom: 4px; }
.sym-name { font-size: 9px; color: var(--text3); margin-bottom: 3px; }
.sym-val { font-size: 12px; font-weight: 600; color: var(--text); }
.sym-sub { font-size: 9px; color: var(--text3); margin-top: 2px; }

/* ── Log Preview ── */
.log-preview {
  margin: 4px 14px 12px;
  background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 12px 16px;
}
.log-preview-title { font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.log-preview-row { font-size: 13px; color: var(--text); line-height: 1.6; }
.log-note { font-size: 11px; color: var(--text2); }
.log-now-btn {
  margin-top: 8px; font-size: 12px; color: var(--pink);
  background: none; border: none; cursor: pointer; padding: 0; font-family: inherit;
}

/* ── Insight Tip ── */
.insight-tip {
  margin: 0 14px 20px;
  border-left: 2px solid var(--pink);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  background: rgba(192,87,106,0.06);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
}
.tip-phase { font-size: 11px; font-weight: 600; margin-bottom: 4px; letter-spacing:.04em; }
.tip-text { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* ── Chart ── */
.chart-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 16px 8px; }
.chart-title { font-size: 18px; font-weight: 600; }
.chart-daybadge { font-size: 12px; background: rgba(192,87,106,0.2); color: #e87fa0; padding: 4px 10px; border-radius: 20px; }
.phase-bar-chart {
  display: flex; height: 20px; margin: 0 14px 10px;
  border-radius: 4px; overflow: hidden;
}
.pbar-seg {
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; letter-spacing: .03em;
}
.chart-tabs { display: flex; gap: 6px; padding: 0 14px 10px; flex-wrap: wrap; }
.chart-tab {
  font-size: 11px; padding: 5px 12px; border-radius: 20px;
  background: var(--surface); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.chart-tab.active { background: var(--pink); color: #fff; border-color: var(--pink); }
.chart-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 14px 8px; }
.legend-item {
  display: flex; align-items: center; gap: 5px; font-size: 11px;
  color: var(--text2); cursor: pointer; transition: opacity .2s;
}
.leg-swatch { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }
.canvas-wrap { position: relative; height: 260px; margin: 0 8px 8px; }
canvas { width: 100% !important; }

/* ── Log Form ── */
.log-head { padding: 16px 16px 8px; }
.log-head-title { font-size: 18px; font-weight: 600; }
.log-head-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
.log-form { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.form-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.form-row-full { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.form-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.form-row input, .form-row textarea {
  width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 8px 10px;
  font-size: 14px; font-family: inherit; outline: none;
}
.form-row textarea { resize: none; }
.star-row { display: flex; gap: 6px; }
.star-btn {
  font-size: 24px; background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 0; line-height: 1; transition: color .15s, transform .15s;
}
.star-btn.active { color: #d4974d; }
.sym-checks { display: flex; flex-wrap: wrap; gap: 6px; }
.sym-check {
  font-size: 11px; padding: 5px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.04); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 4px;
}
.sym-check input { display: none; }
.sym-check.active { background: rgba(192,87,106,0.2); border-color: var(--pink); color: #e87fa0; }
.save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--pink); border: none; color: #fff;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
  letter-spacing: .03em; transition: opacity .15s;
}
.save-btn:active { opacity: 0.8; }
.log-history { padding: 0 14px 20px; }
.hist-title { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.hist-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 0.5px solid var(--border);
  font-size: 13px;
}
.hist-date { color: var(--text2); }
.hist-vals { color: var(--text); }

/* ── Settings ── */
.settings-wrap { padding: 20px 16px 40px; }
.settings-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
.settings-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 12px; font-weight: 500; }
.user-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); margin-bottom: 10px;
}
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 500; }
.user-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.user-actions { display: flex; gap: 6px; }
.user-actions button {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  background: var(--bg3); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
}
.add-user-section { margin-top: 20px; }
.add-form { display: flex; flex-direction: column; gap: 10px; }
.add-form input, .add-form textarea {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px;
  font-size: 14px; font-family: inherit; outline: none;
}
.form-label-sm { font-size: 11px; color: var(--text3); margin-top: -4px; }
.inline-inputs { display: flex; gap: 10px; }
.inline-inputs label {
  flex: 1; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2);
}
.inline-inputs input { width: 60px; text-align: center; flex-shrink: 0; }
.color-row { display: flex; gap: 8px; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform .15s;
}
.color-dot.selected { border-color: #fff; transform: scale(1.2); }
.add-user-btn {
  padding: 13px; border-radius: var(--radius);
  background: var(--pink); border: none; color: #fff;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.back-btn {
  margin-top: 16px; background: none; border: none; color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer; padding: 0;
}

/* ── Weight Analysis ── */
.weight-hint { padding: 0 14px 10px; }
.hint-bar {
  font-size: 12px; padding: 8px 14px; border-radius: var(--radius-sm);
  line-height: 1.5;
}
.hint-warn  { background: rgba(212,151,77,0.15); color: #d4974d; border-left: 2px solid #d4974d; }
.hint-ok    { background: rgba(139,127,212,0.15); color: #a89ae8; border-left: 2px solid #8b7fd4; }
.hint-great { background: rgba(77,184,150,0.15);  color: #4db896; border-left: 2px solid #4db896; }

.weight-stats {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 8px;
  padding: 0 14px 12px;
}
.wstat-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  text-align: center;
}
.wstat-val  { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.wstat-label { font-size: 11px; color: var(--text3); }

.weight-table { margin-bottom: 20px; }

/* ── Log date navigation ── */
.log-date-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.log-date-center { flex: 1; text-align: center; }
.date-picker-input {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 6px 10px; font-size: 14px; font-family: inherit;
  outline: none; width: 100%; text-align: center;
  -webkit-appearance: none;
}
.log-date-sub { font-size: 11px; margin-top: 3px; font-weight: 500; }
.date-nav-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 0.5px solid var(--border);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s; font-family: inherit;
}
.date-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.date-nav-btn:not(:disabled):active { transform: scale(0.92); }

/* batch tip */
.batch-tip { margin-top: 8px; }
.batch-tip-text {
  font-size: 12px; color: #d4974d;
  background: rgba(212,151,77,0.1); border-radius: var(--radius-sm);
  padding: 8px 12px; line-height: 1.5;
  border-left: 2px solid #d4974d;
}

/* history editable rows */
.hist-row-tap { cursor: pointer; }
.hist-right { display: flex; align-items: center; gap: 8px; }
.hist-phase-tag { font-size: 10px; margin-left: 5px; font-weight: 500; }
.hist-edit-btn {
  font-size: 10px; padding: 2px 8px; border-radius: 6px;
  background: var(--bg3); border: 0.5px solid var(--border);
  color: var(--text3); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
</body>
</html>

  font-size: 9px; font-weight: 600; letter-spacing: .03em;
}
.chart-tabs { display: flex; gap: 6px; padding: 0 14px 10px; flex-wrap: wrap; }
.chart-tab {
  font-size: 11px; padding: 5px 12px; border-radius: 20px;
  background: var(--surface); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.chart-tab.active { background: var(--pink); color: #fff; border-color: var(--pink); }
.chart-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 14px 8px; }
.legend-item {
  display: flex; align-items: center; gap: 5px; font-size: 11px;
  color: var(--text2); cursor: pointer; transition: opacity .2s;
}
.leg-swatch { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }
.canvas-wrap { position: relative; height: 260px; margin: 0 8px 8px; }
canvas { width: 100% !important; }

/* ── Log Form ── */
.log-head { padding: 16px 16px 8px; }
.log-head-title { font-size: 18px; font-weight: 600; }
.log-head-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
.log-form { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.form-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.form-row-full { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.form-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.form-row input, .form-row textarea {
  width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 8px 10px;
  font-size: 14px; font-family: inherit; outline: none;
}
.form-row textarea { resize: none; }
.star-row { display: flex; gap: 6px; }
.star-btn {
  font-size: 24px; background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 0; line-height: 1; transition: color .15s, transform .15s;
}
.star-btn.active { color: #d4974d; }
.sym-checks { display: flex; flex-wrap: wrap; gap: 6px; }
.sym-check {
  font-size: 11px; padding: 5px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.04); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 4px;
}
.sym-check input { display: none; }
.sym-check.active { background: rgba(192,87,106,0.2); border-color: var(--pink); color: #e87fa0; }
.save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--pink); border: none; color: #fff;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
  letter-spacing: .03em; transition: opacity .15s;
}
.save-btn:active { opacity: 0.8; }
.log-history { padding: 0 14px 20px; }
.hist-title { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.hist-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 0.5px solid var(--border);
  font-size: 13px;
}
.hist-date { color: var(--text2); }
.hist-vals { color: var(--text); }

/* ── Settings ── */
.settings-wrap { padding: 20px 16px 40px; }
.settings-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
.settings-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 12px; font-weight: 500; }
.user-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); margin-bottom: 10px;
}
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 500; }
.user-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.user-actions { display: flex; gap: 6px; }
.user-actions button {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  background: var(--bg3); border: 0.5px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
}
.add-user-section { margin-top: 20px; }
.add-form { display: flex; flex-direction: column; gap: 10px; }
.add-form input, .add-form textarea {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px;
  font-size: 14px; font-family: inherit; outline: none;
}
.form-label-sm { font-size: 11px; color: var(--text3); margin-top: -4px; }
.inline-inputs { display: flex; gap: 10px; }
.inline-inputs label {
  flex: 1; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2);
}
.inline-inputs input { width: 60px; text-align: center; flex-shrink: 0; }
.color-row { display: flex; gap: 8px; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform .15s;
}
.color-dot.selected { border-color: #fff; transform: scale(1.2); }
.add-user-btn {
  padding: 13px; border-radius: var(--radius);
  background: var(--pink); border: none; color: #fff;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.back-btn {
  margin-top: 16px; background: none; border: none; color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer; padding: 0;
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
</body>
</html>
