<meta charset="UTF-8">

<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#100810; --bg2:#1a0f18; --bg3:#221520; --surface:#2a1826;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.13);
  --text:#f0e8ee; --text2:#b090a8; --text3:#785870;
  --pink:#c0576a; --purple:#8b7fd4; --teal:#4db896; --amber:#d4974d;
  --r:14px; --rs:8px;
  font-family:-apple-system,'Noto Sans TC',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column-reverse;overflow:hidden;}

/* ── Nav ── */
.nav-bar{
  display:flex;background:rgba(16,8,16,0.96);border-top:.5px solid var(--border);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));flex-shrink:0;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 0;transition:color .2s;
}
.nav-btn.active{color:var(--pink);}
.nav-icon{font-size:18px;line-height:1;}
.nav-label{font-size:9px;letter-spacing:.02em;}

/* ── Main ── */
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.main-content::-webkit-scrollbar{display:none;}

/* ── Home Header ── */
.home-header{
  padding:20px 18px 16px;display:flex;flex-direction:column;align-items:center;
  gap:10px;transition:background .5s;
}
.user-switcher{display:flex;gap:8px;align-self:flex-end;}
.user-dot{
  width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:600;color:#fff;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:.45;transition:opacity .2s,transform .2s;
}
.user-dot.active{opacity:1;transform:scale(1.15);box-shadow:0 0 0 2px rgba(255,255,255,.25);}
.moon-circle{
  width:110px;height:110px;border-radius:50%;border:2.5px solid var(--pink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:border-color .5s;position:relative;
}
.moon-circle::before{
  content:'';position:absolute;inset:-7px;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);
}
.day-num{font-size:38px;font-weight:600;line-height:1;letter-spacing:-2px;}
.day-label{font-size:10px;color:var(--text2);}
.phase-badge{font-size:13px;font-weight:500;padding:4px 14px;border-radius:20px;letter-spacing:.04em;}
.cycle-bar-wrap{width:100%;}
.cycle-bar{height:7px;display:flex;border-radius:4px;overflow:hidden;position:relative;}
.cycle-seg{height:100%;transition:background .4s;}
.cycle-indicator{
  position:absolute;top:-3px;width:2px;height:13px;background:#fff;border-radius:1px;
  transform:translateX(-50%);transition:left .5s;box-shadow:0 0 6px rgba(255,255,255,.5);
}
.bar-labels{display:flex;width:100%;margin-top:4px;font-size:9px;text-align:center;}
.bar-labels span{flex:0 0 auto;}

/* ── Symptom cards ── */
.sym-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:14px 13px 8px;}
.sym-card{
  background:var(--surface);border-radius:var(--rs);padding:9px 5px;
  text-align:center;border:.5px solid var(--border);
}
.sym-icon{font-size:16px;margin-bottom:3px;}
.sym-name{font-size:9px;color:var(--text3);margin-bottom:2px;}
.sym-val{font-size:12px;font-weight:600;color:var(--text);}
.sym-sub{font-size:9px;color:var(--text3);margin-top:2px;}

/* ── Log preview ── */
.log-preview{
  margin:4px 13px 10px;background:var(--surface);border-radius:var(--r);
  border:.5px solid var(--border);padding:11px 15px;
}
.log-preview-title{font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.log-preview-row{font-size:13px;color:var(--text);line-height:1.6;}
.log-note{font-size:11px;color:var(--text2);}
.log-now-btn{margin-top:6px;font-size:12px;color:var(--pink);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;}

/* ── Insight / Prediction ── */
.insight-tip{
  margin:0 13px 10px;border-left:2px solid var(--pink);
  background:rgba(192,87,106,.07);padding:10px 13px;border-radius:var(--rs);
}
.tip-phase{font-size:11px;font-weight:600;margin-bottom:3px;letter-spacing:.04em;}
.tip-text{font-size:12px;color:var(--text2);line-height:1.6;}
.pred-card{
  margin:0 13px 18px;background:rgba(77,184,150,.08);border:.5px solid rgba(77,184,150,.3);
  border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:14px;
}
.pred-label{font-size:11px;color:var(--teal);flex-shrink:0;}
.pred-date{font-size:16px;font-weight:500;color:var(--text);}
.pred-days{font-size:12px;color:var(--text2);margin-left:auto;}

/* ── Chart ── */
.chart-head{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 8px;}
.chart-title{font-size:18px;font-weight:600;}
.chart-daybadge{font-size:11px;background:rgba(192,87,106,.2);color:#e87fa0;padding:4px 10px;border-radius:20px;}
.phase-bar-chart{display:flex;height:18px;margin:0 13px 10px;border-radius:4px;overflow:hidden;}
.pbar-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;letter-spacing:.03em;}
.chart-tabs{display:flex;gap:6px;padding:0 13px 10px;flex-wrap:wrap;}
.chart-tab{
  font-size:11px;padding:5px 11px;border-radius:20px;
  background:var(--surface);border:.5px solid var(--border);
  color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;
}
.chart-tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;padding:0 13px 8px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:pointer;transition:opacity .2s;}
.leg-swatch{width:18px;height:3px;border-radius:2px;flex-shrink:0;}
.canvas-wrap{position:relative;height:260px;margin:0 8px 8px;}
canvas{width:100%!important;}

/* ── Weight ── */
.weight-hint{padding:0 13px 10px;}
.hint-bar{font-size:12px;padding:8px 13px;border-radius:var(--rs);line-height:1.5;}
.hint-warn{background:rgba(212,151,77,.15);color:#d4a84d;border-left:2px solid #d4a84d;}
.hint-ok{background:rgba(139,127,212,.15);color:#a89ae8;border-left:2px solid #8b7fd4;}
.hint-great{background:rgba(77,184,150,.15);color:#4db896;border-left:2px solid #4db896;}
.weight-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:0 13px 12px;}
.wstat-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rs);padding:11px;text-align:center;}
.wstat-val{font-size:18px;font-weight:600;color:var(--text);margin-bottom:3px;}
.wstat-label{font-size:10px;color:var(--text3);}

/* ── Log form ── */
.log-head{padding:14px 16px 6px;}
.log-head-title{font-size:18px;font-weight:600;}
.log-date-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.log-date-center{flex:1;text-align:center;}
.date-picker-input{
  width:100%;background:var(--surface);border:.5px solid var(--border);
  border-radius:var(--rs);color:var(--text);padding:6px 10px;
  font-size:14px;font-family:inherit;outline:none;text-align:center;-webkit-appearance:none;
}
.log-date-sub{font-size:11px;margin-top:3px;font-weight:500;}
.date-nav-btn{
  width:36px;height:36px;border-radius:50%;background:var(--surface);
  border:.5px solid var(--border);color:var(--text2);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:inherit;transition:all .15s;
}
.date-nav-btn:disabled{opacity:.25;cursor:not-allowed;}
.log-form{padding:8px 13px 20px;display:flex;flex-direction:column;gap:9px;}
.form-row{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.form-row-full{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.form-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.form-row input,.form-row textarea{
  width:100%;background:rgba(255,255,255,.05);border:.5px solid var(--border);
  border-radius:var(--rs);color:var(--text);padding:7px 10px;
  font-size:14px;font-family:inherit;outline:none;
}
.form-row textarea{resize:none;}
.star-row{display:flex;gap:6px;}
.star-btn{font-size:22px;background:none;border:none;color:var(--text3);cursor:pointer;padding:0;transition:color .15s;}
.star-btn.active{color:#d4974d;}
.sym-checks{display:flex;flex-wrap:wrap;gap:6px;}
.sym-check{
  font-size:11px;padding:5px 10px;border-radius:20px;
  background:rgba(255,255,255,.04);border:.5px solid var(--border);
  color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.sym-check input{display:none;}
.sym-check.active{background:rgba(192,87,106,.2);border-color:var(--pink);color:#e87fa0;}
.save-btn{
  width:100%;padding:13px;border-radius:var(--r);background:var(--pink);border:none;
  color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s;
}
.save-btn:active{opacity:.8;}

/* ── Log history ── */
.log-history{padding:0 13px 20px;}
.hist-title{font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-size:13px;color:var(--text2);}
.hist-vals{font-size:13px;color:var(--text);}
.hist-edit-btn{
  font-size:10px;padding:2px 8px;border-radius:6px;
  background:var(--bg3);border:.5px solid var(--border);
  color:var(--text3);cursor:pointer;font-family:inherit;white-space:nowrap;
}

/* ── Period history ── */
.period-stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 13px 10px;}
.pstat{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center;}
.pstat-val{font-size:18px;font-weight:600;line-height:1.1;}
.pstat-label{font-size:9px;color:var(--text3);margin-top:3px;}
.period-range{font-size:12px;color:var(--text3);text-align:center;margin:-4px 0 10px;padding:0 13px;}
.sync-tip{
  font-size:12px;color:#d4a84d;background:rgba(212,151,77,.1);
  border-radius:var(--rs);padding:8px 12px;margin:0 13px 12px;
  border-left:2px solid #d4a84d;display:flex;align-items:center;gap:8px;
}
.sync-btn{
  font-size:11px;padding:3px 10px;border-radius:6px;background:#d4a84d;
  border:none;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;
}
.add-period-section{padding:0 13px 4px;}
.settings-subtitle{font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500;}
.period-add-form{
  background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);
  padding:12px 13px;display:flex;flex-direction:column;gap:8px;
}
.period-add-row{display:flex;align-items:center;gap:8px;}
.period-add-label{font-size:12px;color:var(--text3);width:52px;flex-shrink:0;}
.period-date-input{
  flex:1;background:rgba(255,255,255,.05);border:.5px solid var(--border);
  border-radius:var(--rs);color:var(--text);padding:7px 10px;
  font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;
}
.add-period-btn{
  width:100%;padding:10px;border-radius:var(--rs);background:var(--pink);
  border:none;color:#fff;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;
}
.mini-chart-wrap{position:relative;height:140px;padding:0 13px;margin-bottom:4px;}
.period-chart-legend{display:flex;gap:12px;font-size:11px;color:var(--text3);padding:0 13px 10px;}
.period-list-wrap{padding:0 13px 20px;}
.period-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:.5px solid var(--border);
}
.period-row:last-child{border-bottom:none;}
.period-row-date{font-size:13px;color:var(--text);}
.period-row-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.period-del-btn{
  font-size:12px;padding:4px 8px;border-radius:6px;
  background:none;border:.5px solid var(--border);color:var(--text3);cursor:pointer;font-family:inherit;flex-shrink:0;
}
.period-empty{text-align:center;padding:24px 13px;}
.period-empty-text{
  font-size:13px;color:var(--text2);line-height:2;
  background:var(--surface);border-radius:var(--r);padding:20px;
}

/* ── Settings ── */
.settings-wrap{padding:20px 16px 40px;}
.settings-title{font-size:20px;font-weight:600;margin-bottom:14px;}
.user-row{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:8px;
}
.user-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:600;color:#fff;flex-shrink:0;
}
.user-info{flex:1;}
.user-name{font-size:14px;font-weight:500;}
.user-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.user-actions{display:flex;gap:6px;}
.user-actions button{
  font-size:11px;padding:4px 10px;border-radius:6px;
  background:var(--bg3);border:.5px solid var(--border);color:var(--text2);cursor:pointer;font-family:inherit;
}
.add-form{display:flex;flex-direction:column;gap:10px;}
.add-form input{
  width:100%;background:var(--surface);border:.5px solid var(--border);
  border-radius:var(--rs);color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;
}
.form-label-sm{font-size:11px;color:var(--text3);margin-top:-4px;}
.inline-inputs{display:flex;gap:10px;}
.inline-inputs label{flex:1;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.inline-inputs input{width:58px;text-align:center;flex-shrink:0;}
.color-row{display:flex;gap:8px;}
.color-dot{
  width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;
  cursor:pointer;transition:transform .15s;
}
.color-dot.selected{border-color:#fff;transform:scale(1.2);}
.add-user-btn{
  padding:13px;border-radius:var(--r);background:var(--pink);border:none;
  color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
}
.add-family-btn{
  width:100%;padding:10px;border-radius:var(--rs);margin-top:8px;
  background:none;border:.5px dashed var(--border);color:var(--text2);
  font-size:13px;font-family:inherit;cursor:pointer;
}
.back-btn{
  margin-top:16px;background:none;border:none;color:var(--text2);
  font-size:14px;font-family:inherit;cursor:pointer;padding:0;
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
</body>
</html>

  width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform .15s;
}
.color-dot.selected { border-color: #fff; transform: scale(1.2); }
.add-user-btn {
  padding: 13px; border-radius: var(--radius);
  background: var(--pink); border: none; color: #fff;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.back-btn {
  margin-top: 16px; background: none; border: none; color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer; padding: 0;
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
</body>
</html>
